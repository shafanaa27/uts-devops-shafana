---
- name: Konfigurasi Server Analitik
  hosts: server
  gather_facts: false

  tasks:

    - name: install python dan pip
      raw: apt-get update && apt-get install -y python3 python3-pip

    - name: copy requirements.txt ke server
      copy:
        src: requirements.txt
        dest: /tmp/requirements.txt

    - name: install pandas dari requirements.txt
      pip:
        requirements: requirements.txt
        extra_args: --break-system-packages